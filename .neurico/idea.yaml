idea:
  title: An LLM That's Careful With Its Words
  domain: nlp
  hypothesis: 'Requiring a chain-of-thought process or inserting explicit thinking
    tokens between every sentence will cause an LLM to consider each sentence more
    carefully before generating it, resulting in qualitatively different text compared
    to standard generation.

    '
  background:
    description: 'Can we use chain-of-thought to make an LLM that considers every
      sentence carefully before stating it? For instance, simply require some thinking
      tokens between every sentence. How would text from such a model be qualitatively
      different?

      '
  metadata:
